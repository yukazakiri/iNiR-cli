name: Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]

jobs:
  go-benchmarks:
    name: Go Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'

      - name: Run benchmark suite
        run: |
          mkdir -p .artifacts
          go test ./cmd -run '^$' -bench 'Benchmark(IPC|Color)' -benchmem -benchtime=20x | tee .artifacts/benchmarks.txt

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: go-benchmarks
          path: .artifacts/benchmarks.txt
